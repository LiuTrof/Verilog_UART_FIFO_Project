name: DV Platform Checks

on:
  push:
  pull_request:

jobs:
  platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Install backend dependencies
        run: python -m pip install -r dv_platform/backend/requirements.txt
      - name: Run platform unit tests
        run: python -m pytest -q
      - name: Run FIFO boundary smoke regression
        run: python -m dv_platform.automation --cases fifo --regression-id ci-fifo
      - name: Build dashboard
        working-directory: dv_platform/frontend
        run: npm ci && npm run build
