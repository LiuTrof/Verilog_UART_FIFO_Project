<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="475" viewBox="0 0 1440 475" role="img" aria-labelledby="title desc">
  <title id="title">自检 Verilog Testbench 流程</title>
  <desc id="desc">测试选择使 Driver 和 Monitor 并行工作；Scoreboard 将预期队列与接收的 UART 数据比较，同时执行 FIFO 安全检查。</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#26547c"/></marker><style>.title{font:700 28px Arial,sans-serif;fill:#102a43}.box{font:700 18px Arial,sans-serif;fill:#102a43}.text{font:15px Arial,sans-serif;fill:#243b53}.small{font:13px Arial,sans-serif;fill:#486581}.line{stroke:#26547c;stroke-width:3;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1440" height="475" fill="#f7fafc"/><text x="60" y="54" class="title">当前 Testbench 如何得出 PASS 或 FAIL</text>
  <rect x="60" y="145" width="190" height="102" rx="8" fill="#d9f0ff" stroke="#3182ce" stroke-width="2"/><text x="155" y="183" class="box" text-anchor="middle">Testcase</text><text x="155" y="208" class="text" text-anchor="middle">+TEST=single/multi/...</text><text x="155" y="230" class="small" text-anchor="middle">选择测试场景</text>
  <rect x="350" y="145" width="190" height="102" rx="8" fill="#e6fffa" stroke="#319795" stroke-width="2"/><text x="445" y="183" class="box" text-anchor="middle">Driver</text><text x="445" y="208" class="text" text-anchor="middle">预期字节入队</text><text x="445" y="230" class="small" text-anchor="middle">驱动 UART rx</text>
  <rect x="640" y="145" width="190" height="102" rx="8" fill="#f4e8ff" stroke="#805ad5" stroke-width="2"/><text x="735" y="183" class="box" text-anchor="middle">DUT</text><text x="735" y="208" class="text" text-anchor="middle">UART + 两个 FIFO</text><text x="735" y="230" class="small" text-anchor="middle">回环数据路径</text>
  <rect x="930" y="145" width="190" height="102" rx="8" fill="#ffe9e3" stroke="#c05621" stroke-width="2"/><text x="1025" y="183" class="box" text-anchor="middle">Monitor</text><text x="1025" y="208" class="text" text-anchor="middle">采样 UART tx</text><text x="1025" y="230" class="small" text-anchor="middle">还原实际字节</text>
  <rect x="1165" y="145" width="190" height="102" rx="8" fill="#fff5d6" stroke="#b7791f" stroke-width="2"/><text x="1260" y="183" class="box" text-anchor="middle">Scoreboard</text><text x="1260" y="208" class="text" text-anchor="middle">预期值与实际值比较</text><text x="1260" y="230" class="small" text-anchor="middle">PASS / FAIL</text>
  <path d="M250 196 H350" class="line"/><path d="M540 196 H640" class="line"/><path d="M830 196 H930" class="line"/><path d="M1120 196 H1165" class="line"/>
  <path d="M445 247 V330 H1165" class="line"/><text x="735" y="318" class="small" text-anchor="middle">发送串行帧之前，先将预期字节写入队列</text>
  <rect x="510" y="362" width="420" height="64" rx="8" fill="#fff" stroke="#718096" stroke-width="2"/><text x="720" y="390" class="box" text-anchor="middle">并行 FIFO 安全检查</text><text x="720" y="412" class="small" text-anchor="middle">任一 FIFO 同时报告 full=1、empty=1 时判为失败</text>
</svg>
