<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="510" viewBox="0 0 1440 510" role="img" aria-labelledby="title desc">
  <title id="title">UART frame and state machines</title>
  <desc id="desc">UART 8N1 frame format and transmitter receiver state progression using 16 ticks per bit.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#26547c"/></marker>
    <style>.title{font:700 28px Arial,sans-serif;fill:#102a43}.subtitle{font:700 18px Arial,sans-serif;fill:#102a43}.text{font:15px Arial,sans-serif;fill:#243b53}.small{font:13px Arial,sans-serif;fill:#486581}.line{stroke:#26547c;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1440" height="510" fill="#f7fafc"/>
  <text x="60" y="52" class="title">UART 8N1 framing and internal state progression</text>
  <text x="60" y="84" class="text">One bit lasts 16 baud-rate ticks. At 100 MHz this RTL uses 651 clocks per tick, so one bit is about 104.16 us.</text>

  <text x="60" y="132" class="subtitle">Serial frame on rx / tx (LSB first)</text>
  <line x1="95" y1="242" x2="1350" y2="242" stroke="#1a202c" stroke-width="3"/>
  <path d="M95 242 H150 V315 H270 V170 H390 V315 H510 V170 H630 V315 H750 V170 H870 V315 H990 V170 H1110 V315 H1230 V170 H1350" fill="none" stroke="#38a169" stroke-width="5"/>
  <g class="text" text-anchor="middle"><text x="210" y="350">start = 0</text><text x="330" y="350">D0</text><text x="450" y="350">D1</text><text x="570" y="350">D2</text><text x="690" y="350">D3</text><text x="810" y="350">D4</text><text x="930" y="350">D5</text><text x="1050" y="350">D6</text><text x="1170" y="350">D7</text><text x="1290" y="350">stop = 1</text></g>
  <g class="small" text-anchor="middle"><text x="210" y="375">1 bit</text><text x="750" y="397">A5 = 1010_0101 is sent as D0..D7 = 1,0,1,0,0,1,0,1</text></g>

  <text x="60" y="435" class="subtitle">Transmitter</text>
  <rect x="250" y="405" width="110" height="46" rx="7" fill="#d9f0ff" stroke="#3182ce"/><text x="305" y="434" class="text" text-anchor="middle">IDLE</text>
  <rect x="470" y="405" width="110" height="46" rx="7" fill="#ffe9e3" stroke="#c05621"/><text x="525" y="434" class="text" text-anchor="middle">START</text>
  <rect x="690" y="405" width="110" height="46" rx="7" fill="#fff5d6" stroke="#b7791f"/><text x="745" y="434" class="text" text-anchor="middle">DATA</text>
  <rect x="910" y="405" width="110" height="46" rx="7" fill="#e9f7ef" stroke="#2f855a"/><text x="965" y="434" class="text" text-anchor="middle">STOP</text>
  <path d="M360 428 H470" class="line"/><path d="M580 428 H690" class="line"/><path d="M800 428 H910" class="line"/><path d="M1020 428 H1130 V390 H305 V405" class="line"/>
  <text x="1185" y="432" class="small">tx_done pulses here</text>
</svg>
