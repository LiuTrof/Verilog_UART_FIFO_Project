<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-labelledby="title desc">
  <title id="title">UART FIFO loopback architecture</title>
  <desc id="desc">A verification driver sends serial RX data through UART receiver, RX FIFO, loopback control, TX FIFO, UART transmitter, and a verification monitor. A scoreboard compares expected and actual data.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#26547c"/></marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #102a43; }
      .boxTitle { font: 700 18px Arial, sans-serif; fill: #102a43; }
      .text { font: 15px Arial, sans-serif; fill: #243b53; }
      .small { font: 13px Arial, sans-serif; fill: #486581; }
      .line { stroke: #26547c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1440" height="480" fill="#f7fafc"/>
  <text x="60" y="54" class="title">UART FIFO Loopback: data path and verification path</text>

  <rect x="60" y="148" width="145" height="102" rx="8" fill="#d9f0ff" stroke="#3182ce" stroke-width="2"/>
  <text x="132" y="187" class="boxTitle" text-anchor="middle">Driver</text><text x="132" y="211" class="text" text-anchor="middle">drives rx</text><text x="132" y="233" class="small" text-anchor="middle">serial frame</text>

  <rect x="290" y="148" width="152" height="102" rx="8" fill="#e9f7ef" stroke="#2f855a" stroke-width="2"/>
  <text x="366" y="181" class="boxTitle" text-anchor="middle">UART RX</text><text x="366" y="207" class="small" text-anchor="middle">receiver +</text><text x="366" y="226" class="small" text-anchor="middle">rx_done pulse</text>

  <rect x="515" y="148" width="130" height="102" rx="8" fill="#fff5d6" stroke="#b7791f" stroke-width="2"/>
  <text x="580" y="190" class="boxTitle" text-anchor="middle">RX FIFO</text><text x="580" y="216" class="small" text-anchor="middle">8 x 8-bit</text>

  <rect x="713" y="148" width="170" height="102" rx="8" fill="#f4e8ff" stroke="#805ad5" stroke-width="2"/>
  <text x="798" y="183" class="boxTitle" text-anchor="middle">Loopback control</text><text x="798" y="210" class="small" text-anchor="middle">move when RX not empty</text><text x="798" y="229" class="small" text-anchor="middle">and TX not full</text>

  <rect x="950" y="148" width="130" height="102" rx="8" fill="#fff5d6" stroke="#b7791f" stroke-width="2"/>
  <text x="1015" y="190" class="boxTitle" text-anchor="middle">TX FIFO</text><text x="1015" y="216" class="small" text-anchor="middle">8 x 8-bit</text>

  <rect x="1150" y="148" width="152" height="102" rx="8" fill="#e9f7ef" stroke="#2f855a" stroke-width="2"/>
  <text x="1226" y="181" class="boxTitle" text-anchor="middle">UART TX</text><text x="1226" y="207" class="small" text-anchor="middle">transmitter +</text><text x="1226" y="226" class="small" text-anchor="middle">tx_done pulse</text>

  <path d="M205 199 H290" class="line"/><text x="247" y="185" class="small" text-anchor="middle">rx</text>
  <path d="M442 199 H515" class="line"/><path d="M645 199 H713" class="line"/><path d="M883 199 H950" class="line"/><path d="M1080 199 H1150" class="line"/>
  <path d="M1302 199 H1360 V329 H1265" class="line"/><text x="1330" y="185" class="small" text-anchor="middle">tx</text>

  <rect x="1058" y="278" width="207" height="105" rx="8" fill="#ffe9e3" stroke="#c05621" stroke-width="2"/>
  <text x="1162" y="316" class="boxTitle" text-anchor="middle">Monitor</text><text x="1162" y="340" class="text" text-anchor="middle">decodes tx frame</text><text x="1162" y="361" class="small" text-anchor="middle">actual byte</text>
  <rect x="686" y="278" width="235" height="105" rx="8" fill="#e6fffa" stroke="#319795" stroke-width="2"/>
  <text x="803" y="316" class="boxTitle" text-anchor="middle">Scoreboard</text><text x="803" y="340" class="text" text-anchor="middle">expected queue vs actual</text><text x="803" y="361" class="small" text-anchor="middle">PASS / FAIL</text>
  <path d="M1058 330 H921" class="line"/>
  <path d="M132 250 V330 H686" class="line"/>
  <text x="405" y="317" class="small" text-anchor="middle">expected byte is queued before serial transmission</text>
</svg>
